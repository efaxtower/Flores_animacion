        </div>
        <div class="long-g long-g--1">

    <script>
        function bloomFlower() {
            if (document.body.classList.contains('not-loaded')) {
                document.body.classList.remove("not-loaded");
                document.querySelector('.reloadBtn').textContent = '🔄 Reiniciar';
            } else {
                location.reload();
            }
        }



    function bloomFlower() {
    if (document.body.classList.contains('not-loaded')) {
        document.body.classList.remove("not-loaded");
        document.querySelector('.reloadBtn').textContent = '🔄 Reiniciar';
        
        // Mostrar mensaje especial después de 2 segundos
        setTimeout(() => {
            document.getElementById('mensajeEspecial').classList.add('visible');

}






function bloomFlower() {
    if (document.body.classList.contains('not-loaded')) {
        document.body.classList.remove("not-loaded");
        document.querySelector('.reloadBtn').textContent = '🔄 Reiniciar';
        
        // Reproducir música suave
        const musica = document.getElementById('musicaFondo');
        musica.volume = 0.2;
        musica.play().catch(e => console.log("Esperando interacción del usuario"));
        
        // Mostrar mensaje
        setTimeout(() => {
            document.getElementById('mensajeEspecial').classList.add('visible');
        }, 2000);
    } else {
        location.reload();
    }
}


const frases = [
    "Algunas flores brillan más cuando alguien especial las mira",
    "No todos los jardines tienen tulipanes neón... este es único",
    "Hay miradas que hacen florecer hasta el código",
    "Dicen que las flores crecen hacia donde hay luz",
    "En este jardín digital, alguien piensa en ti",
    "Los tulipanes no hablan... pero a veces dicen mucho",
    "Programar flores es fácil cuando hay inspiración",
    "Hay personas que son como tulipanes: brillan en la oscuridad",
    "Este jardín tiene un bug... late más rápido cuando lo miras",
    "No sé dibujar, pero sé programar flores"
];

function bloomFlower() {
    if (document.body.classList.contains('not-loaded')) {
        document.body.classList.remove("not-loaded");
        document.querySelector('.reloadBtn').textContent = '🔄 Reiniciar';
        
        // Frase aleatoria 
        const fraseAleatoria = frases[Math.floor(Math.random() * frases.length)];
        document.getElementById('fraseInspiradora').textContent = fraseAleatoria;
        
        // Mensaje principal
        setTimeout(() => {
            document.getElementById('mensajeEspecial').classList.add('visible');
        }, 2000);
    } else {
        location.reload();
    }
}
    </script>
</body>
